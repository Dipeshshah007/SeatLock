<svg width="900" height="980" viewBox="0 0 900 980" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b6573" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="980" fill="#0e1116"/>

  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f2f4f7">SeatLock — System Architecture</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#9aa4b2">Concurrency-safe event ticketing platform</text>

  <!-- Client -->
  <rect x="300" y="95" width="300" height="64" rx="12" fill="#1a2029" stroke="#818cf8" stroke-width="1"/>
  <text x="450" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#f2f4f7">React + Vite + TypeScript</text>
  <text x="450" y="140" text-anchor="middle" font-size="12" fill="#9aa4b2">Seat map UI · checkout · admin dashboard</text>

  <line x1="450" y1="159" x2="450" y2="200" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="468" y="183" font-size="11" fill="#9aa4b2">HTTPS + JWT Bearer</text>

  <!-- API -->
  <rect x="270" y="200" width="360" height="68" rx="12" fill="#1a2029" stroke="#818cf8" stroke-width="1"/>
  <text x="450" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#f2f4f7">Express.js REST API (Node + TypeScript)</text>
  <text x="450" y="246" text-anchor="middle" font-size="12" fill="#9aa4b2">Auth · Events · Seats · Bookings · Admin · Rate limiting</text>

  <line x1="350" y1="268" x2="220" y2="330" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="560" y1="268" x2="700" y2="330" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Postgres -->
  <rect x="80" y="330" width="320" height="110" rx="12" fill="#1a2029" stroke="#34d399" stroke-width="1"/>
  <text x="240" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#f2f4f7">PostgreSQL — Source of Truth</text>
  <text x="240" y="380" text-anchor="middle" font-size="12" fill="#9aa4b2">SELECT ... FOR UPDATE row locks</text>
  <text x="240" y="398" text-anchor="middle" font-size="12" fill="#9aa4b2">UNIQUE(event_id, seat_id) constraint</text>
  <text x="240" y="416" text-anchor="middle" font-size="12" fill="#9aa4b2">Transactions guarantee atomic holds</text>

  <!-- Redis -->
  <rect x="540" y="330" width="280" height="110" rx="12" fill="#1a2029" stroke="#ffb020" stroke-width="1"/>
  <text x="680" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#f2f4f7">Redis — TTL Hold Cache</text>
  <text x="680" y="380" text-anchor="middle" font-size="12" fill="#9aa4b2">5-minute seat-hold expiry keys</text>
  <text x="680" y="398" text-anchor="middle" font-size="12" fill="#9aa4b2">Fast countdown UX layer</text>
  <text x="680" y="416" text-anchor="middle" font-size="12" fill="#9aa4b2">Not the source of truth</text>

  <line x1="240" y1="440" x2="240" y2="480" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="680" y1="440" x2="380" y2="480" stroke="#5b6573" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="420" y="468" font-size="11" fill="#9aa4b2">lazy expiry check</text>

  <!-- Cron sweep -->
  <rect x="80" y="480" width="740" height="60" rx="12" fill="#161b22" stroke="#2a313c" stroke-width="1"/>
  <text x="450" y="505" text-anchor="middle" font-size="14" font-weight="700" fill="#f2f4f7">Cron sweep job — every 30 seconds</text>
  <text x="450" y="524" text-anchor="middle" font-size="12" fill="#9aa4b2">SELECT ... FOR UPDATE SKIP LOCKED → releases expired HELD seats back to AVAILABLE</text>

  <line x1="240" y1="540" x2="240" y2="580" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="680" y1="540" x2="560" y2="580" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- event_seats -->
  <rect x="80" y="580" width="340" height="160" rx="14" fill="#161b22" stroke="#2a313c" stroke-width="1"/>
  <text x="250" y="608" text-anchor="middle" font-size="14" font-weight="700" fill="#f2f4f7">event_seats table</text>

  <rect x="110" y="625" width="90" height="34" rx="6" fill="rgba(52,211,153,0.14)" stroke="#34d399"/>
  <text x="155" y="647" text-anchor="middle" font-size="11" font-weight="600" fill="#34d399">AVAILABLE</text>

  <rect x="215" y="625" width="70" height="34" rx="6" fill="rgba(255,176,32,0.14)" stroke="#ffb020"/>
  <text x="250" y="647" text-anchor="middle" font-size="11" font-weight="600" fill="#ffb020">HELD</text>

  <rect x="300" y="625" width="80" height="34" rx="6" fill="rgba(248,113,113,0.14)" stroke="#f87171"/>
  <text x="340" y="647" text-anchor="middle" font-size="11" font-weight="600" fill="#f87171">BOOKED</text>

  <text x="250" y="685" text-anchor="middle" font-size="12" fill="#9aa4b2">UNIQUE(event_id, seat_id)</text>
  <text x="250" y="703" text-anchor="middle" font-size="12" fill="#9aa4b2">structurally prevents double-booking</text>
  <text x="250" y="724" text-anchor="middle" font-size="11" fill="#5b6573">version column for optimistic checks</text>

  <!-- Booking/payment -->
  <rect x="460" y="580" width="360" height="160" rx="14" fill="#161b22" stroke="#2a313c" stroke-width="1"/>
  <text x="640" y="608" text-anchor="middle" font-size="14" font-weight="700" fill="#f2f4f7">Booking + payment flow</text>
  <text x="640" y="632" text-anchor="middle" font-size="12" fill="#9aa4b2">1. PENDING booking created from held seats</text>
  <text x="640" y="652" text-anchor="middle" font-size="12" fill="#9aa4b2">2. Mock payment gateway charges (~5% simulated failure)</text>
  <text x="640" y="672" text-anchor="middle" font-size="12" fill="#9aa4b2">3. Success → seats CONFIRMED atomically</text>
  <text x="640" y="692" text-anchor="middle" font-size="12" fill="#9aa4b2">4. Failure → seats released automatically</text>
  <text x="640" y="716" text-anchor="middle" font-size="11" fill="#5b6573">Idempotency key prevents double-charge on retry</text>

  <line x1="250" y1="740" x2="250" y2="780" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="640" y1="740" x2="450" y2="780" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- audit log -->
  <rect x="160" y="780" width="580" height="64" rx="12" fill="#161b22" stroke="#2a313c" stroke-width="1"/>
  <text x="450" y="806" text-anchor="middle" font-size="14" font-weight="700" fill="#f2f4f7">seat_audit_log</text>
  <text x="450" y="826" text-anchor="middle" font-size="12" fill="#9aa4b2">Every status transition recorded — observability for debugging race conditions</text>

  <line x1="450" y1="844" x2="450" y2="880" stroke="#5b6573" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- email -->
  <rect x="330" y="880" width="240" height="50" rx="10" fill="#1a2029" stroke="#34d399" stroke-width="1"/>
  <text x="450" y="910" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399">Email confirmation (async, non-blocking)</text>

  <text x="450" y="960" text-anchor="middle" font-size="11" fill="#5b6573">Postgres = correctness guarantee · Redis = fast UX layer · Cron = safety net</text>
</svg>
