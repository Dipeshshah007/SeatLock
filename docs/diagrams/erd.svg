<svg width="1000" height="640" viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b6573" stroke-width="1.3"/>
    </marker>
  </defs>
  <rect width="1000" height="640" fill="#0e1116"/>
  <text x="500" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#f2f4f7">SeatLock — Entity Relationship Diagram</text>

  <g>
    <rect x="30" y="70" width="180" height="130" rx="8" fill="#1a2029" stroke="#818cf8"/>
    <rect x="30" y="70" width="180" height="28" rx="8" fill="#818cf8"/>
    <text x="120" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1300">users</text>
    <text x="42" y="116" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="42" y="132" font-size="11" fill="#9aa4b2">name, email</text>
    <text x="42" y="148" font-size="11" fill="#9aa4b2">password_hash</text>
    <text x="42" y="164" font-size="11" fill="#9aa4b2">role</text>
    <text x="42" y="184" font-size="10" fill="#5b6573">USER · ADMIN · ORGANIZER</text>
  </g>

  <g>
    <rect x="270" y="70" width="180" height="100" rx="8" fill="#1a2029" stroke="#34d399"/>
    <rect x="270" y="70" width="180" height="28" rx="8" fill="#34d399"/>
    <text x="360" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#04342c">venues</text>
    <text x="282" y="116" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="282" y="132" font-size="11" fill="#9aa4b2">name, address</text>
    <text x="282" y="148" font-size="11" fill="#9aa4b2">city, country</text>
  </g>

  <g>
    <rect x="270" y="210" width="180" height="130" rx="8" fill="#1a2029" stroke="#34d399"/>
    <rect x="270" y="210" width="180" height="28" rx="8" fill="#34d399"/>
    <text x="360" y="229" text-anchor="middle" font-size="12" font-weight="700" fill="#04342c">seats</text>
    <text x="282" y="256" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="282" y="272" font-size="11" fill="#9aa4b2">venue_id (FK)</text>
    <text x="282" y="288" font-size="11" fill="#9aa4b2">section, row_label</text>
    <text x="282" y="304" font-size="11" fill="#9aa4b2">seat_number, seat_type</text>
    <text x="282" y="324" font-size="10" fill="#5b6573">UNIQUE(venue,section,row,num)</text>
  </g>

  <g>
    <rect x="510" y="70" width="200" height="150" rx="8" fill="#1a2029" stroke="#ffb020"/>
    <rect x="510" y="70" width="200" height="28" rx="8" fill="#ffb020"/>
    <text x="610" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1300">events</text>
    <text x="522" y="116" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="522" y="132" font-size="11" fill="#9aa4b2">title, category</text>
    <text x="522" y="148" font-size="11" fill="#9aa4b2">venue_id (FK)</text>
    <text x="522" y="164" font-size="11" fill="#9aa4b2">organizer_id (FK)</text>
    <text x="522" y="180" font-size="11" fill="#9aa4b2">starts_at, ends_at</text>
    <text x="522" y="196" font-size="11" fill="#9aa4b2">status, base_price</text>
  </g>

  <g>
    <rect x="510" y="250" width="220" height="160" rx="8" fill="#1a2029" stroke="#f87171" stroke-width="2"/>
    <rect x="510" y="250" width="220" height="28" rx="8" fill="#f87171"/>
    <text x="620" y="269" text-anchor="middle" font-size="12" font-weight="700" fill="#501313">event_seats *</text>
    <text x="522" y="296" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="522" y="312" font-size="11" fill="#9aa4b2">event_id (FK), seat_id (FK)</text>
    <text x="522" y="328" font-size="11" fill="#9aa4b2">price, status, version</text>
    <text x="522" y="344" font-size="11" fill="#9aa4b2">held_by (FK), held_until</text>
    <text x="522" y="368" font-size="10" fill="#5b6573">UNIQUE(event_id, seat_id)</text>
    <text x="522" y="384" font-size="10" fill="#5b6573">the concurrency-safety anchor</text>
    <text x="522" y="400" font-size="10" fill="#5b6573">locked via SELECT...FOR UPDATE</text>
  </g>

  <g>
    <rect x="780" y="70" width="190" height="130" rx="8" fill="#1a2029" stroke="#818cf8"/>
    <rect x="780" y="70" width="190" height="28" rx="8" fill="#818cf8"/>
    <text x="875" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1300">bookings</text>
    <text x="792" y="116" font-size="11" fill="#f2f4f7">id (PK), booking_ref</text>
    <text x="792" y="132" font-size="11" fill="#9aa4b2">user_id (FK), event_id (FK)</text>
    <text x="792" y="148" font-size="11" fill="#9aa4b2">status, total_amount</text>
    <text x="792" y="164" font-size="11" fill="#9aa4b2">confirmed_at, cancelled_at</text>
  </g>

  <g>
    <rect x="780" y="230" width="190" height="90" rx="8" fill="#1a2029" stroke="#818cf8"/>
    <rect x="780" y="230" width="190" height="28" rx="8" fill="#818cf8"/>
    <text x="875" y="249" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1300">booking_seats</text>
    <text x="792" y="276" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="792" y="292" font-size="11" fill="#9aa4b2">booking_id, event_seat_id (FK)</text>
  </g>

  <g>
    <rect x="780" y="350" width="190" height="100" rx="8" fill="#1a2029" stroke="#34d399"/>
    <rect x="780" y="350" width="190" height="28" rx="8" fill="#34d399"/>
    <text x="875" y="369" text-anchor="middle" font-size="12" font-weight="700" fill="#04342c">payments</text>
    <text x="792" y="396" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="792" y="412" font-size="11" fill="#9aa4b2">booking_id (FK)</text>
    <text x="792" y="428" font-size="11" fill="#9aa4b2">idempotency_key (UNIQUE)</text>
  </g>

  <g>
    <rect x="510" y="450" width="220" height="100" rx="8" fill="#1a2029" stroke="#5b6573"/>
    <rect x="510" y="450" width="220" height="28" rx="8" fill="#5b6573"/>
    <text x="620" y="469" text-anchor="middle" font-size="12" font-weight="700" fill="#0e1116">seat_audit_log</text>
    <text x="522" y="496" font-size="11" fill="#f2f4f7">id (PK)</text>
    <text x="522" y="512" font-size="11" fill="#9aa4b2">event_seat_id (FK), user_id (FK)</text>
    <text x="522" y="528" font-size="11" fill="#9aa4b2">from_status, to_status, reason</text>
  </g>

  <line x1="210" y1="120" x2="270" y2="130" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="360" y1="170" x2="360" y2="210" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="360" y1="120" x2="510" y2="130" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="210" y1="140" x2="510" y2="170" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="610" y1="220" x2="620" y2="250" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="450" y1="280" x2="510" y2="300" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="210" y1="160" x2="780" y2="130" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="710" y1="150" x2="780" y2="150" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="875" y1="200" x2="875" y2="230" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="780" y1="280" x2="730" y2="320" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="875" y1="320" x2="875" y2="350" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>
  <line x1="620" y1="410" x2="620" y2="450" stroke="#5b6573" stroke-width="1" marker-end="url(#a)"/>

  <text x="500" y="600" text-anchor="middle" font-size="11" fill="#5b6573">* event_seats is the table the entire concurrency-safety design centers on</text>
</svg>
